worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Define a cache zone named 'tile_cache', with a 100MB RAM index, and 10GB max disk size.
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=tile_cache:100m max_size=10g inactive=365d use_temp_path=off;

    # DNS resolver required to resolve upstream domain names
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    server {
        listen 8080;
        
        # Route 1: Proxy map tiles from CARTO
        # Allowlist host inside the regex itself
        location ~ ^/proxy/tiles/(?<target_domain>(?:[a-d]\.)?basemaps\.cartocdn\.com)/(?<target_path>.*)$ {
            
            # Reconstruct the upstream URL
            proxy_pass https://$target_domain/$target_path$is_args$args;
            
            # Essential Headers for upstream
            proxy_set_header Host $target_domain;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # Strip cookies just in case
            proxy_hide_header Set-Cookie;
            proxy_ignore_headers Set-Cookie;
            
            # Caching Rules
            proxy_cache tile_cache;
            proxy_cache_valid 200 304 365d;   # Cache successful responses for 1 year
            proxy_cache_valid any 1m;         # Cache failures for 1 min
            proxy_cache_lock on;              # Prevent thundering herd
            
            # Force browser caching
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;
            
        }

        # Catch-all 403 — nginx checks regex locations in source order, so the
        # allowlist above still wins for cartocdn requests.
        location ~ ^/proxy/tiles/ {
            return 403;
        }

        # Route 2: Pass everything else to OSIRIS
        location / {
            # In docker-compose, 'osiris' is the hostname of the Next.js container
            proxy_pass http://osiris:3000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support (Required for Next.js hot reloading and potential live feeds)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
